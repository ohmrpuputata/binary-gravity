<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="t d" font-family="'Consolas','SFMono-Regular','Roboto Mono',monospace">
  <title id="t">Alien Apocalypse — мод выживания для Minecraft Fabric 1.21.1</title>
  <desc id="d">Баннер в стиле орбитального отчёта: сигнально-зелёная траектория восьмидневного вторжения спускается к янтарной метке босса 8-го дня над заражённой планетой, рядом — логотип Alien Apocalypse.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.65" y2="1">
      <stop offset="0" stop-color="#05070C"/>
      <stop offset="0.55" stop-color="#0A1018"/>
      <stop offset="1" stop-color="#090611"/>
    </linearGradient>
    <radialGradient id="planet" cx="38%" cy="32%" r="80%">
      <stop offset="0" stop-color="#0E2A1E"/>
      <stop offset="0.5" stop-color="#0A151A"/>
      <stop offset="1" stop-color="#05080C"/>
    </radialGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="0.78" stop-color="#6BFF93" stop-opacity="0"/>
      <stop offset="0.93" stop-color="#6BFF93" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6BFF93" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6BFF93" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#6BFF93" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sig" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#B7FFC9"/>
      <stop offset="0.5" stop-color="#6BFF93"/>
      <stop offset="1" stop-color="#128A4B"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#2E5C44" stroke-opacity="0.5" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#000000" opacity="0.5"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gridfade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0.16"/>
    </linearGradient>
    <mask id="gridmask"><rect width="1200" height="400" fill="url(#gridfade)"/></mask>
  </defs>

  <!-- поле -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)" mask="url(#gridmask)"/>

  <!-- звёзды -->
  <g fill="#E9F5EC">
    <circle cx="250" cy="60" r="1" opacity="0.5"/><circle cx="470" cy="40" r="1.2" opacity="0.4"/>
    <circle cx="560" cy="150" r="1" opacity="0.3"/><circle cx="640" cy="300" r="1" opacity="0.35"/>
    <circle cx="180" cy="330" r="1" opacity="0.3"/><circle cx="900" cy="60" r="1.1" opacity="0.45"/>
    <circle cx="1040" cy="40" r="1" opacity="0.3"/><circle cx="380" cy="250" r="1" opacity="0.25"/>
    <circle cx="120" cy="180" r="1" opacity="0.3"/><circle cx="820" cy="330" r="1" opacity="0.3"/>
  </g>

  <!-- лимб заражённой планеты -->
  <g>
    <circle cx="1240" cy="232" r="250" fill="url(#planet)"/>
    <circle cx="1240" cy="232" r="250" fill="none" stroke="url(#atmo)" stroke-width="26"/>
    <circle cx="1240" cy="232" r="250" fill="none" stroke="#6BFF93" stroke-opacity="0.55" stroke-width="1.5"/>
    <path d="M1006 168 q70 26 150 18" fill="none" stroke="#2E5C44" stroke-opacity="0.6" stroke-width="2"/>
    <path d="M1012 300 q90 30 180 8" fill="none" stroke="#2E5C44" stroke-opacity="0.45" stroke-width="2"/>
    <circle cx="1090" cy="232" r="34" fill="#6BFF93" opacity="0.05"/>
  </g>

  <!-- корабль-носитель и луч удара -->
  <g>
    <path d="M642 110 L726 110 L772 300 L596 300 Z" fill="url(#beam)"/>
    <ellipse cx="684" cy="96" rx="44" ry="13" fill="#0A1119" stroke="#6BFF93" stroke-opacity="0.8" stroke-width="1.5"/>
    <path d="M666 90 a18 12 0 0 1 36 0 z" fill="#0E2A1E" stroke="#6BFF93" stroke-opacity="0.7" stroke-width="1.2"/>
    <circle cx="684" cy="103" r="2.2" fill="#FFB020"/>
    <circle cx="668" cy="100" r="1.4" fill="#6BFF93"/><circle cx="700" cy="100" r="1.4" fill="#6BFF93"/>
  </g>

  <!-- траектория восьмидневного вторжения -->
  <g>
    <path d="M704 100 C 776 90 842 100 892 126 C 944 154 978 196 996 230"
          fill="none" stroke="#2E5C44" stroke-width="1.6" stroke-dasharray="2 6" stroke-linecap="round" opacity="0.85"/>
    <g fill="#6BFF93">
      <circle cx="706" cy="99" r="3" opacity="0.55"/>
      <circle cx="754" cy="93" r="3" opacity="0.6"/>
      <circle cx="803" cy="97" r="3.2" opacity="0.66"/>
      <circle cx="850" cy="110" r="3.4" opacity="0.72"/>
      <circle cx="896" cy="130" r="3.6" opacity="0.8"/>
      <circle cx="938" cy="158" r="3.8" opacity="0.88"/>
      <circle cx="972" cy="194" r="4" opacity="0.95"/>
    </g>
    <text x="700" y="84" fill="#8AA596" font-size="11" letter-spacing="1.5">ДЕНЬ 1</text>
    <text x="980" y="206" fill="#FFB020" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="end">ДЕНЬ 8 · МАТЬ РОЯ</text>
    <!-- метка босса 8-го дня -->
    <circle cx="996" cy="230" r="14" fill="none" stroke="#FFB020" stroke-opacity="0.5" stroke-width="1.5">
      <animate attributeName="r" values="11;17;11" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.6;0.1;0.6" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="996" cy="230" r="6" fill="#FFB020" filter="url(#glow)"/>
    <circle cx="996" cy="230" r="2.6" fill="#FFF1D6"/>
  </g>

  <!-- угловые метки + риски шкалы -->
  <g stroke="#2E5C44" stroke-width="2" fill="none">
    <path d="M24 40 V24 H40"/><path d="M1176 40 V24 H1160"/>
    <path d="M24 360 V376 H40"/><path d="M1176 360 V376 H1160"/>
  </g>
  <g stroke="#2E5C44" stroke-width="1" opacity="0.5">
    <path d="M360 26 v6 M420 26 v6 M480 26 v6 M540 26 v6 M600 26 v6 M660 26 v6 M720 26 v6 M780 26 v6 M840 26 v6 M900 26 v6"/>
  </g>
  <text x="52" y="33" fill="#2E5C44" font-size="12" letter-spacing="2.5">// ПОЛЕВОЙ ОТЧЁТ О ВТОРЖЕНИИ</text>
  <text x="1148" y="33" fill="#2E5C44" font-size="12" letter-spacing="2.5" text-anchor="end">MC 1.21.1 / FABRIC / JAVA 21</text>

  <!-- сигил: прицел + доли роя + шеврон удара -->
  <g transform="translate(70,96)">
    <circle r="30" fill="none" stroke="#2E5C44" stroke-width="1.5"/>
    <g stroke="#6BFF93" stroke-width="2" stroke-linecap="round">
      <path d="M0 -30 V-20 M0 30 V20 M-30 0 H-20 M30 0 H20"/>
    </g>
    <g fill="url(#sig)">
      <path d="M0 -3 C 10 -20 24 -16 23 -3 C 16 -6 8 -4 3 4 Z"/>
      <path d="M0 -3 C 10 -20 24 -16 23 -3 C 16 -6 8 -4 3 4 Z" transform="rotate(120)"/>
      <path d="M0 -3 C 10 -20 24 -16 23 -3 C 16 -6 8 -4 3 4 Z" transform="rotate(240)"/>
    </g>
    <circle r="4.5" fill="#FFB020"/>
    <path d="M-7 9 L0 17 L7 9" fill="none" stroke="#FFB020" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- надстрочник -->
  <text x="122" y="84" fill="#6BFF93" font-size="14" letter-spacing="4">MINECRAFT · FABRIC · 1.21.1</text>
  <text x="122" y="104" fill="#8AA596" font-size="12.5" letter-spacing="2">ПОЭТАПНОЕ ВТОРЖЕНИЕ · ДЕНЬ 1 → ДЕНЬ 8</text>

  <!-- логотип -->
  <g font-family="'Arial Black','Arial Narrow',Impact,sans-serif" font-weight="900" letter-spacing="-1">
    <text x="118" y="194" fill="#E9F5EC" font-size="82">ALIEN</text>
    <text x="118" y="268" fill="#6BFF93" font-size="82" filter="url(#glow)">APOCALYPSE</text>
  </g>

  <!-- подзаголовок -->
  <text x="122" y="304" fill="#C8D8CD" font-size="16" letter-spacing="0.4">Выживание в поэтапном вторжении: заражение, радиация, рой и босс на 8-й день.</text>

  <!-- чипы статистики -->
  <g font-size="13" font-weight="700" letter-spacing="1">
    <rect x="122" y="330" width="126" height="30" rx="6" fill="#0B121C" stroke="#2E5C44"/>
    <text x="185" y="350" fill="#6BFF93" text-anchor="middle">103 РЕЦЕПТА</text>
    <rect x="258" y="330" width="156" height="30" rx="6" fill="#0B121C" stroke="#2E5C44"/>
    <text x="336" y="350" fill="#6BFF93" text-anchor="middle">219 ТАБЛИЦ ЛУТА</text>
    <rect x="424" y="330" width="138" height="30" rx="6" fill="#0B121C" stroke="#2E5C44"/>
    <text x="493" y="350" fill="#6BFF93" text-anchor="middle">493 ТЕКСТУРЫ</text>
  </g>

  <!-- индикатор угрозы -->
  <text x="1148" y="352" fill="#2E5C44" font-size="12" letter-spacing="2" text-anchor="end">УГРОЗА  РАЗВЕДКА › ШТУРМ › <tspan fill="#FFB020">ТОТАЛЬНАЯ ВОЙНА</tspan></text>

  <!-- текстура -->
  <rect width="1200" height="400" fill="url(#scan)" opacity="0.35"/>
</svg>
